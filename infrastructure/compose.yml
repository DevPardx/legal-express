services:
  postgres:
    image: postgres:16-alpine
    container_name: legal_express_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: legal_express
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legal_express"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7-alpine
    container_name: legal_express_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  backend:
    image: legal-express-backend:dev
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.backend
      target: development
    container_name: legal_express_backend
    env_file:
      - ../apps/backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/legal_express
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ../apps/backend/src:/app/apps/backend/src:ro
      - backend_generated:/app/apps/backend/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
  
  frontend:
    image: legal-express-frontend:dev
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.frontend
      target: development
    container_name: legal_express_frontend
    ports:
      - "5173:5173"
    volumes:
      - ../apps/frontend/src:/app/apps/frontend/src:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_generated: