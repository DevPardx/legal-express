apiVersion: v1
kind: Service
metadata:
  name: legal-express-backend
  namespace: legal-express
spec:
  selector:
    app: legal-express-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: legal-express-frontend
  namespace: legal-express
spec:
  selector:
    app: legal-express-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer