apiVersion: v1
kind: Secret
metadata:
  name: legal-express-secrets
  namespace: legal-express
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:password@postgres-service:5432/legal_express"
  REDIS_URL: "redis://redis-service:6379"
  WEBHOOK_SECRET: "replace-with-32-char-secret-in-ci"