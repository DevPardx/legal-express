name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/legal-express

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: legal_express_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/backend/prisma/schema.prisma

      - name: TypeCheck all packages
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit tests (frontend)
        run: npm run test -w apps/frontend -- --coverage
        
      - name: Run unit & integration tests (backend)
        run: npm run test -w apps/backend -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/legal_express_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Create backend .env for E2E
        run: |
          cat > apps/backend/.env << 'EOF'
          NODE_ENV=development
          PORT=3000
          DATABASE_URL=postgresql://postgres:password@postgres:5432/legal_express
          REDIS_URL=redis://redis:6379
          FRONTEND_URL=http://localhost:5173
          PDF_STORAGE_DIR=./generated
          WEBHOOK_SECRET=e2e-webhook-secret-for-ci-testing-only-00
          JWT_SECRET=e2e-jwt-secret-for-ci-testing-only-000000000
          ADMIN_EMAIL=admin@legalexpress.local
          ADMIN_PASSWORD=e2etestpassword
          LOG_LEVEL=debug
          EOF

      - name: Start services
        run: npm run docker:up

      - name: Wait for services
        run: |
          npx wait-on http://localhost:5173 http://localhost:3000/health --timeout 180000

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f infrastructure/compose.yml logs --tail=50

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.${{ matrix.service }}
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cluster
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: Apply K8s manifests
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml
          kubectl apply -f infrastructure/k8s/secret.yaml
          kubectl apply -f infrastructure/k8s/deployment.yaml
          kubectl apply -f infrastructure/k8s/service.yaml

      - name: Update image tags
        run: |
          SHA="${{ github.sha }}"
          kubectl set image deployment/legal-express-backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:sha-${SHA:0:7} \
            -n legal-express
          kubectl set image deployment/legal-express-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:sha-${SHA:0:7} \
            -n legal-express

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/legal-express-backend -n legal-express --timeout=120s
          kubectl rollout status deployment/legal-express-frontend -n legal-express --timeout=120s